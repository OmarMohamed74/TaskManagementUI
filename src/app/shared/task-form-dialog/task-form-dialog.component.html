<p-dialog header="Create Task" [(visible)]="visible" [modal]="true" [style]="{ width: '40vw' }" (onHide)="close()">
  <form [formGroup]="form">
    <div class="mb-3">
      <label for="taskTitle" class="form-label">Title <span class="text-danger">*</span></label>
      <input id="taskTitle" type="text" pInputText class="w-100" formControlName="title" placeholder="Title" />
      @if(form.get('title')?.invalid && form.get('title')?.touched){
      <small class="text-danger">Title is required</small>
      }
    </div>

    <div class="mb-3">
      <label for="taskDesc" class="form-label">Description</label>
      <textarea id="taskDesc" pTextarea class="w-100" rows="3" formControlName="description"
        placeholder="Description"></textarea>
    </div>

    <div class="mb-3">
      <label for="taskAssignee" class="form-label">Assign To</label>
      <p-select inputId="taskAssignee" [filter]="true" optionLabel="label" optionValue="value" filterBy="label"
        [options]="userOptions" appendTo="body" formControlName="assigneeId" placeholder="Select user"
        [showClear]="true" styleClass="w-100" />
    </div>

    <div class="mb-3">
      <label for="taskPriority" class="form-label">Priority</label>
      <p-select inputId="taskPriority" [options]="priorityOptions" formControlName="priority" styleClass="w-100" />
    </div>



    <div class="row">
      <div class="mb-3">
        <label for="taskDue" class="form-label">Due Date</label>
        <p-datepicker inputId="taskDue" formControlName="dueDate" [style]="{'width':'100%'}" appendTo="body"
          dateFormat="yy-mm-dd" [showIcon]="true" styleClass="w-100" inputStyleClass="w-100" [minDate]="minDate" />
      </div>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="d-flex justify-content-end gap-2">
      <p-button label="Close" severity="danger" icon="pi pi-lock" (onClick)="close()" />
      <p-button severity="success" (onClick)="onSubmit()" label="Create Task" icon="pi pi-check"
        [disabled]="form.invalid" />
    </div>
  </ng-template>
</p-dialog>
