<p-toast></p-toast>
<div class="d-flex flex-column h-100 bg-white overflow-hidden">
  <div class="row flex-grow-1 overflow-hidden m-0 w-100">

    <!-- Left Sidebar -->
    <div class="col-12 col-md-4 col-lg-3 border-end p-0 d-flex flex-column bg-light h-100 overflow-hidden">
      <div class="p-3 border-bottom bg-white d-flex align-items-center">
        <h5 class="mb-0 fw-bold"><i class="pi pi-comments me-2"></i>Chats</h5>
      </div>

      <p-scrollPanel [style]="{ width: '100%', height: 'calc(100% - 60px)' }">
        <div class="list-group list-group-flush">
          <!-- Team Chat Option -->
          <button
            class="list-group-item list-group-item-action d-flex align-items-center gap-2 p-3 border-0 rounded-0"
            [class.active]="chatMode === 'team'"
            [class.text-white]="chatMode === 'team'"
            [class.bg-success]="chatMode === 'team'"
            (click)="selectTeamChat()"
          >
            <i class="pi pi-users fs-4"></i>
            <span class="fw-medium">Team Chat</span>
          </button>

          <!-- Divider -->
          <div class="px-3 py-2 text-muted small fw-semibold bg-white border-top border-bottom" style="position: sticky; top: 0; z-index: 1;">
            MEMBERS
          </div>

          <!-- Users List -->
          <button
            *ngFor="let user of users"
            class="list-group-item list-group-item-action d-flex align-items-center justify-content-between p-3 border-0 rounded-0"
            [class.active]="chatMode === 'private' && selectedReceiverId === user.id"
            [class.text-white]="chatMode === 'private' && selectedReceiverId === user.id"
            [class.bg-success]="chatMode === 'private' && selectedReceiverId === user.id"
            (click)="selectUserChat(user.id)"
          >
            <div class="d-flex align-items-center gap-3">
              <!-- Avatar -->
              <div
                class="rounded-circle d-flex align-items-center justify-content-center shadow-sm"
                [class.bg-white]="chatMode === 'private' && selectedReceiverId === user.id"
                [class.text-success]="chatMode === 'private' && selectedReceiverId === user.id"
                [class.bg-secondary]="!(chatMode === 'private' && selectedReceiverId === user.id)"
                [class.text-white]="!(chatMode === 'private' && selectedReceiverId === user.id)"
                style="width: 40px; height: 40px; font-weight: bold; font-size: 1.2rem;"
              >
                {{ (user.fullName || user.userName).charAt(0).toUpperCase() }}
              </div>
              <!-- Name -->
              <span class="fw-medium">{{ user.fullName || user.userName }}</span>
            </div>
            <!-- Online Indicator -->
            <span *ngIf="onlineUserIds.includes(user.id)" class="rounded-circle shadow-sm" [class.bg-white]="chatMode === 'private' && selectedReceiverId === user.id" [class.bg-success]="!(chatMode === 'private' && selectedReceiverId === user.id)" style="width: 12px; height: 12px; display: inline-block;"></span>
          </button>
        </div>
      </p-scrollPanel>
    </div>

    <!-- Right Chat Area -->
    <div class="col-12 col-md-8 col-lg-9 p-0 d-flex flex-column h-100 overflow-hidden bg-light border-start">
      <!-- Chat Header -->
      <div class="p-3 border-bottom bg-white d-flex align-items-center shadow-sm z-1">
        <h5 class="mb-0 fw-bold">{{ chatTitle }}</h5>
      </div>

      <!-- Message List -->
      <div #scrollContainer class="flex-grow-1 overflow-auto p-3" style="position: relative;">

        <div *ngIf="messages.length === 0 && !loading" class="h-100 d-flex flex-column align-items-center justify-content-center text-muted">
          <i class="pi pi-inbox fs-1 d-block mb-3"></i>
          <h5>No messages yet</h5>
        </div>

        <div *ngFor="let msg of messages" class="d-flex mb-3" [class.justify-content-end]="msg.senderId === currentUserId" [class.justify-content-start]="msg.senderId !== currentUserId">
          <div style="max-width: 75%;">
            <small class="text-muted d-block mb-1 px-1" [class.text-end]="msg.senderId === currentUserId">{{ msg.senderName }}</small>
            <div class="p-3 rounded-4 shadow-sm"
                 [class.bg-success]="msg.senderId === currentUserId"
                 [class.text-white]="msg.senderId === currentUserId"
                 [class.bg-white]="msg.senderId !== currentUserId"
                 [class.text-dark]="msg.senderId !== currentUserId"
                 [ngStyle]="msg.senderId === currentUserId ? {'border-bottom-right-radius': '4px'} : {'border-bottom-left-radius': '4px'}">
              {{ msg.content }}
            </div>
            <small class="text-muted d-block mt-1 px-1" [class.text-end]="msg.senderId === currentUserId">{{ msg.sendAt | date: 'HH:mm' }}</small>
          </div>
        </div>
      </div>

      <!-- Message Input -->
      <div class="p-3 border-top bg-white shadow-lg z-1 mt-auto">
        <div class="d-flex gap-2 align-items-center">
          <input type="text" pInputText class="flex-grow-1 w-100 p-2 border-0 bg-light" style="box-shadow: none;" placeholder="Type a message..." [(ngModel)]="messageText" (keyup.enter)="sendMessage()" />
          <p-button icon="pi pi-send" severity="success" [rounded]="true" [disabled]="!messageText.trim()" (onClick)="sendMessage()"></p-button>
        </div>
      </div>
    </div>
  </div>
</div>
